{% extends "base.html" %}

{% block title %}{{ item.title }} | Парфюмерный бутик{% endblock %}

{% block content %}
<section class="item-detail">
  <div class="item-detail-media">
    {% if item.image_path %}
    <img src="{{ item.image_path }}" alt="{{ item.title }}" loading="lazy" />
    {% endif %}
  </div>

  <div class="item-detail-content">
    <p class="item-detail-badge">{{ section_data.name }}</p>
    <h1>{{ item.title }}</h1>
    <p>{{ item.description }}</p>
    <a href="/section/{{ section_slug }}" class="item-detail-back">Вернуться в раздел</a>
  </div>
</section>
{% endblock %}
