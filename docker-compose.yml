version: "3.9"

services:
  web:
    build: .
    container_name: perfume_boutique_web
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/boutique.db
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
