<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход в панель владельца</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/admin.css" />
</head>
<body class="admin-login-body">
  <main class="login-card">
    <h1>Панель владельца</h1>
    <p>Введите учетные данные для управления витриной.</p>

    {% if error %}
      <div class="error">Неверный логин или пароль.</div>
    {% endif %}

    <form method="post" action="/admin/login" class="login-form">
      <label>Логин
        <input type="text" name="username" required />
      </label>
      <label>Пароль
        <input type="password" name="password" required />
      </label>
      <button type="submit">Войти</button>
    </form>
    <a href="/">Вернуться на витрину</a>
  </main>
</body>
</html>
